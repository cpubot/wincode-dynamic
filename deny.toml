# Configuration for cargo-deny
# See https://embarkstudios.github.io/cargo-deny/

[advisories]
version = 2
yanked = "warn"

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"

[licenses]
version = 2
confidence-threshold = 0.8
allow = [
    "MIT",
    "Apache-2.0",
    "Unicode-3.0",
]

[sources]
unknown-registry = "warn"
unknown-git = "warn"
