name: CI

on:
    push:
        branches: [master]
    pull_request:

env:
    NIGHTLY: nightly-2025-06-23

jobs:
    nightly:
        name: rustfmt, clippy & miri (nightly)
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
            - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
              with:
                  toolchain: ${{ env.NIGHTLY }}
                  components: rustfmt, clippy, miri, rust-src
                  rustflags: ""
            - name: rustfmt (check)
              run: cargo +${{ env.NIGHTLY }} fmt --all -- --check
            - name: clippy (deny warnings)
              run: cargo +${{ env.NIGHTLY }} clippy --all-targets --all-features -- -D warnings
            - name: clippy (no_std)
              run: cargo +${{ env.NIGHTLY }} clippy --no-default-features -- -D warnings
            - name: miri (check)
              run: cargo +${{ env.NIGHTLY }} miri test --all-features --lib --no-fail-fast --workspace

    test:
        name: tests (MSRV)
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
            - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
              with:
                  toolchain: 1.89.0
                  rustflags: ""
            - name: tests
              run: cargo test --all-features --all-targets --no-fail-fast --workspace
            - name: test doc
              run: cargo test --all-features --doc --no-fail-fast --workspace

    deny:
        name: cargo-deny
        runs-on: ubuntu-latest
        env:
            RUSTUP_TOOLCHAIN: 1.89.0
        steps:
            - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
            - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
              with:
                  toolchain: 1.89.0
                  rustflags: ""
            - name: install cargo-deny
              run: cargo install cargo-deny --version 0.19.0 --locked
            - name: cargo deny
              run: cargo deny check
